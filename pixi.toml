[workspace]
authors = ["Giordon Stark <kratsg@gmail.com>"]
channels = ["conda-forge"]
name = "histlens"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
dashboard-dev = { cmd = "bun run dev", cwd = "dashboard" }
dashboard-build = { cmd = "bun run build", cwd = "dashboard" }
dashboard-test = { cmd = "bun run test", cwd = "dashboard" }
dashboard-lint = { cmd = "bun run lint", cwd = "dashboard" }
dashboard-format = { cmd = "bun run format", cwd = "dashboard" }
dashboard-check = { cmd = "bun run check", cwd = "dashboard" }
lint = "pre-commit run --all-files"

[dependencies]
bun = ">=1.3.11,<2"
nodejs = ">=20"
pre-commit = ">=4"
